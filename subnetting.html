<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Outil Subnetting</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="nav-container"></div>
    <main>
        <h1>4. Subnetting & Calculateur</h1>
        <div class="card">
            <h3>Calculateur CIDR interactif</h3>
            <input type="number" id="cidrInput" placeholder="CIDR (ex: 26)" min="0" max="32">
            <button onclick="calculate()">Calculer</button>
            <div id="res" class="terminal" style="margin-top:20px; display:none;">
                <p>Masque : <span id="m"></span></p>
                <p>Hôtes utiles : <span id="h"></span></p>
            </div>
        </div>
    </main>
    <script>
        function calculate() {
            const c = parseInt(document.getElementById('cidrInput').value);
            let mask = [];
            for(let i=0; i<4; i++) {
                let b = Math.min(8, Math.max(0, c - (i*8)));
                mask.push(256 - Math.pow(2, 8-b));
            }
            document.getElementById('m').innerText = mask.join('.');
            document.getElementById('h').innerText = Math.max(0, Math.pow(2, 32-c)-2);
            document.getElementById('res').style.display = 'block';
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
