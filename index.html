        <h1>1. Variable Length Subnet Masking</h1>
        <div class="card">
            <h3>Concept (PDF Page 2)</h3>
            <p>Le VLSM permet de créer des <strong>sous-réseaux d'un sous-réseau</strong> pour optimiser l'espace d'adressage.</p>
        </div>
        <div class="card">
            <h3>Protocoles Supportés</h3>
            <p>Seuls les protocoles "Classless" supportent le VLSM :</p>
            <ul>
                <li><strong>RIPv2</strong></li>
                <li><strong>EIGRP</strong></li>
                <li><strong>OSPF</strong></li>
            </ul>
