<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz interactif</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="nav-container"></div>
    <main>
        <h1>8. Quiz d'auto-évaluation</h1>
        <div class="card">
            <p>1. RIPv1 supporte-t-il le VLSM ?</p>
            <button onclick="ans(false)">OUI</button>
            <button onclick="ans(true)">NON</button>
            <p id="f" style="margin-top:15px; font-weight:bold;"></p>
        </div>
    </main>
    <script>
        function ans(c) {
            const f = document.getElementById('f');
            f.innerText = c ? "Correct ! RIPv1 est classfull." : "Faux. RIPv1 ne gère pas les masques.";
            f.style.color = c ? "green" : "red";
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
